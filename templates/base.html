{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Discora{% endblock %}</title>

    <link rel="icon" type="image/x-icon" href="{% static 'img/IconDiscoraNovo.png' %}">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/base.css' %}">
</head>
<body>

    <nav>

        <a href="{% url 'home' %}" class="nav-logo">
            <img src="{% static 'img/DiscoraCnb.png' %}" alt="Logo Discora">
        </a>

        <div class="auth-group">
            {% if user.is_authenticated %}
                <a href="{% url 'logout' %}">Sair</a>

                <a href="{% url 'perfil' %}" class="user-name-nav">Olá, {{ user.username }}</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'cadastro' %}">Cadastrar</a>
            {% endif %}
        </div>

    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 Discora - Comunidade de Escuta Musical</p>
    </footer>

</body>
</html>
